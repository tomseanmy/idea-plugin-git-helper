name: Release

# Publish to JetBrains Marketplace when a version tag (v0.1.0) is pushed.
# Prerequisites (one-time setup, see docs/release.md):
#   1. Upload token: https://plugins.jetbrains.com/author/me/tokens  →  add as secret PUBLISH_TOKEN
#   2. Signing cert: https://plugins.jetbrains.com/author/me/tokens  →  add as secrets SIGNING_CERT_CHAIN, SIGNING_PRIVATE_KEY, SIGNING_PASSWORD
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, verify and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # The signing certificate is issued by JetBrains only AFTER your first
      # plugin upload is approved, so the very first release has no signing
      # secrets yet. We detect that and publish unsigned (allowed; just shows
      # an "untrusted" warning on install).
      - name: Detect signing secrets
        id: sign
        run: |
          if [ -n "${{ secrets.SIGNING_CERT_CHAIN }}" ] && [ -n "${{ secrets.SIGNING_PRIVATE_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Signing is configured."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No signing secrets found — publishing unsigned (allowed for the first release)."
          fi

      - name: Build, verify, sign and publish
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          SIGNING_CERT_CHAIN: ${{ secrets.SIGNING_CERT_CHAIN }}
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishPlugin --no-daemon -PpluginVersion=${{ steps.ver.outputs.version }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-helper-${{ steps.ver.outputs.version }}
          path: build/distributions/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
